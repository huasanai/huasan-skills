<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" role="img" aria-label="huasan-skills — a growing toolkit of Claude Code skills">
  <title>huasan-skills</title>
  <desc>Left half is the main brand title with RGB-glitch effect. Right half is a constellation of 11 skill chips that fade up sequentially then gently float — visualizing the growing toolkit.</desc>

  <defs>
    <radialGradient id="bgGlow" cx="78%" cy="50%" r="65%">
      <stop offset="0%"  stop-color="#0a2415"/>
      <stop offset="60%" stop-color="#020806"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>

    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#00ff41"/>
      <stop offset="55%" stop-color="#00ff41"/>
      <stop offset="100%" stop-color="#5dd4f5"/>
    </linearGradient>

    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="strongGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <style><![CDATA[
      @keyframes fadeIn   { 0%{opacity:0;} 100%{opacity:1;} }
      @keyframes fadeUp   { 0%{opacity:0; transform:translateY(8px);} 100%{opacity:1; transform:translateY(0);} }
      @keyframes drawStroke { 0%{stroke-dashoffset:200;} 100%{stroke-dashoffset:0;} }
      @keyframes floatY   { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-3px);} }
      @keyframes glitchJitter  { 0%,90%,100%{transform:translate(-2.5px,0);} 2%{transform:translate(-2.5px,1px);} 4%{transform:translate(-2.5px,-1px);} }
      @keyframes glitchJitterB { 0%,90%,100%{transform:translate(2.5px,0);} 2%{transform:translate(2.5px,-1px);} 4%{transform:translate(2.5px,1px);} }

      .brand-stack { animation: fadeUp 0.8s cubic-bezier(0.16,1,0.3,1) 0.20s backwards; }
      .ghost-cyan  { transform: translate(-2.5px, 0); animation: glitchJitter 6s ease-in-out 2.5s infinite; }
      .ghost-red   { transform: translate(2.5px, 0); animation: glitchJitterB 6s ease-in-out 2.5s infinite; }
      .brand-bar   { stroke-dasharray: 200; animation: drawStroke 0.7s cubic-bezier(0.16,1,0.3,1) 0.70s backwards; }
      .brand-sub   { animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.85s backwards; }
      .brand-tag   { animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 1.05s backwards; }
      .brand-meta  { animation: fadeIn 0.6s ease 1.30s backwards; }

      /* 11 skill chips — staggered fadeUp + gentle floatY (different phases) */
      .chip { transform-origin: center; }
      .chip-1  { animation: fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) 0.80s backwards, floatY 6.5s ease-in-out 2.0s infinite; }
      .chip-2  { animation: fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) 0.87s backwards, floatY 7.0s ease-in-out 2.3s infinite; }
      .chip-3  { animation: fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) 0.94s backwards, floatY 6.2s ease-in-out 2.6s infinite; }
      .chip-4  { animation: fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) 1.01s backwards, floatY 7.3s ease-in-out 2.9s infinite; }
      .chip-5  { animation: fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) 1.08s backwards, floatY 6.8s ease-in-out 3.2s infinite; }
      .chip-6  { animation: fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) 1.15s backwards, floatY 7.5s ease-in-out 3.5s infinite; }
      .chip-7  { animation: fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) 1.22s backwards, floatY 6.4s ease-in-out 3.8s infinite; }
      .chip-8  { animation: fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) 1.29s backwards, floatY 7.2s ease-in-out 4.1s infinite; }
      .chip-9  { animation: fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) 1.36s backwards, floatY 6.6s ease-in-out 4.4s infinite; }
      .chip-10 { animation: fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) 1.43s backwards, floatY 7.4s ease-in-out 4.7s infinite; }
      .chip-11 { animation: fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) 1.50s backwards, floatY 6.9s ease-in-out 5.0s infinite; }

      .signature { animation: fadeIn 0.8s ease 1.95s backwards; }
    ]]></style>
  </defs>

  <!-- ===== Background ===== -->
  <rect width="1200" height="380" fill="url(#bgGlow)"/>
  <g opacity="0.05">
    <rect x="0" y="0"   width="1200" height="1" fill="#00ff41"/>
    <rect x="0" y="378" width="1200" height="1" fill="#00ff41"/>
  </g>

  <!-- ===== LEFT: Brand area (x: 60-580) ===== -->
  <g class="brand-stack">
    <text x="60" y="115" font-size="14" fill="#5dd4f5" opacity="0.5" letter-spacing="2"
          font-family="ui-monospace, 'SF Mono', Menlo, monospace">// 11 skills · evolving</text>

    <g style="transform-origin: 60px 170px;">
      <text class="ghost-cyan" x="60" y="180" font-size="62" font-weight="700"
            fill="#5dd4f5" opacity="0.55" letter-spacing="-1"
            font-family="ui-monospace, 'SF Mono', Menlo, monospace">huasan-skills</text>
      <text class="ghost-red" x="60" y="180" font-size="62" font-weight="700"
            fill="#ff5577" opacity="0.4" letter-spacing="-1"
            font-family="ui-monospace, 'SF Mono', Menlo, monospace">huasan-skills</text>
      <text x="60" y="180" font-size="62" font-weight="700"
            fill="url(#titleGrad)" filter="url(#strongGlow)" letter-spacing="-1"
            font-family="ui-monospace, 'SF Mono', Menlo, monospace">huasan-skills</text>
    </g>

    <line class="brand-bar" x1="60" y1="200" x2="200" y2="200"
          stroke="#5dd4f5" stroke-width="2.5" stroke-linecap="round"/>

    <text class="brand-sub" x="60" y="232" font-size="19" fill="#00ff41" opacity="0.85"
          font-family="ui-monospace, 'SF Mono', Menlo, monospace">a growing toolkit.</text>

    <text class="brand-tag" x="60" y="262" font-size="14" font-style="italic"
          fill="#7eb89a" letter-spacing="0.5"
          font-family="Georgia, 'Songti SC', serif">AI coding · learning · content · infra · life-os.</text>

    <g class="brand-meta" opacity="0.55">
      <text x="60" y="305" font-size="10" fill="#5dd4f5" letter-spacing="2"
            font-family="ui-monospace, 'SF Mono', Menlo, monospace">[ DIRECTORY ]</text>
      <text x="155" y="305" font-size="10" fill="#f1fa8c" letter-spacing="2"
            font-family="ui-monospace, 'SF Mono', Menlo, monospace">[ MIT ]</text>
      <text x="215" y="305" font-size="10" fill="#ff9f6c" letter-spacing="2"
            font-family="ui-monospace, 'SF Mono', Menlo, monospace">[ EVOLVING ]</text>
    </g>

    <text x="60" y="350" font-size="11" font-style="italic" opacity="0.45" fill="#7eb89a"
          font-family="Georgia, 'Songti SC', serif">// each skill lives in its own repo. this is the front door.</text>
  </g>

  <!-- ===== RIGHT: 11 skill chips, floating constellation ===== -->
  <g filter="url(#softGlow)" font-family="ui-monospace, 'SF Mono', Menlo, monospace"
     font-size="11" font-weight="500">

    <!-- Row 1: AI Coding / Learning (3 chips) — cyan accent -->
    <g class="chip chip-1">
      <rect x="640" y="58" width="110" height="22" rx="11" fill="#052812"
            stroke="#5dd4f5" stroke-width="1" stroke-opacity="0.5"/>
      <text x="695" y="73" text-anchor="middle" fill="#5dd4f5">handcode-tutor</text>
    </g>
    <g class="chip chip-2">
      <rect x="765" y="58" width="104" height="22" rx="11" fill="#052812"
            stroke="#5dd4f5" stroke-width="1" stroke-opacity="0.5"/>
      <text x="817" y="73" text-anchor="middle" fill="#5dd4f5">coding-mentor</text>
    </g>
    <g class="chip chip-3">
      <rect x="884" y="58" width="110" height="22" rx="11" fill="#052812"
            stroke="#5dd4f5" stroke-width="1" stroke-opacity="0.5"/>
      <text x="939" y="73" text-anchor="middle" fill="#5dd4f5">ai-coding-wiki</text>
    </g>

    <!-- Row 2: Claude Code Tooling (2 chips) — purple accent -->
    <g class="chip chip-4">
      <rect x="650" y="92" width="117" height="22" rx="11" fill="#1a0e2c"
            stroke="#c792ea" stroke-width="1" stroke-opacity="0.5"/>
      <text x="708" y="107" text-anchor="middle" fill="#c792ea">cc-provider-add</text>
    </g>
    <g class="chip chip-5">
      <rect x="782" y="92" width="144" height="22" rx="11" fill="#1a0e2c"
            stroke="#c792ea" stroke-width="1" stroke-opacity="0.5"/>
      <text x="854" y="107" text-anchor="middle" fill="#c792ea">conversation-logger</text>
    </g>

    <!-- Row 3: Infra (2 chips) — orange accent -->
    <g class="chip chip-6">
      <rect x="640" y="126" width="104" height="22" rx="11" fill="#2a1808"
            stroke="#ffb86c" stroke-width="1" stroke-opacity="0.5"/>
      <text x="692" y="141" text-anchor="middle" fill="#ffb86c">vps-vpn-setup</text>
    </g>
    <g class="chip chip-7">
      <rect x="759" y="126" width="144" height="22" rx="11" fill="#2a1808"
            stroke="#ffb86c" stroke-width="1" stroke-opacity="0.5"/>
      <text x="831" y="141" text-anchor="middle" fill="#ffb86c">vps-vpn-clash-setup</text>
    </g>

    <!-- Row 4: Content (3 chips) — yellow accent -->
    <g class="chip chip-8">
      <rect x="655" y="160" width="104" height="22" rx="11" fill="#2a2408"
            stroke="#f1fa8c" stroke-width="1" stroke-opacity="0.5"/>
      <text x="707" y="175" text-anchor="middle" fill="#f1fa8c">podcast-to-md</text>
    </g>
    <g class="chip chip-9">
      <rect x="774" y="160" width="104" height="22" rx="11" fill="#2a2408"
            stroke="#f1fa8c" stroke-width="1" stroke-opacity="0.5"/>
      <text x="826" y="175" text-anchor="middle" fill="#f1fa8c">artifact-html</text>
    </g>
    <g class="chip chip-10">
      <rect x="893" y="160" width="162" height="22" rx="11" fill="#2a2408"
            stroke="#f1fa8c" stroke-width="1" stroke-opacity="0.5"/>
      <text x="974" y="175" text-anchor="middle" fill="#f1fa8c">github-epub-productizer</text>
    </g>

    <!-- Row 5: Template (1 chip) — matrix green -->
    <g class="chip chip-11">
      <rect x="655" y="194" width="117" height="22" rx="11" fill="#052812"
            stroke="#00ff41" stroke-width="1" stroke-opacity="0.5"/>
      <text x="713" y="209" text-anchor="middle" fill="#00ff41">lifeos-template</text>
    </g>
  </g>

  <!-- ===== Category legend (bottom right corner) ===== -->
  <g opacity="0.5" class="brand-meta">
    <text x="640" y="248" font-size="9" letter-spacing="1.5"
          fill="#5dd4f5" font-family="ui-monospace, 'SF Mono', Menlo, monospace">● AI CODING</text>
    <text x="740" y="248" font-size="9" letter-spacing="1.5"
          fill="#c792ea" font-family="ui-monospace, 'SF Mono', Menlo, monospace">● TOOLING</text>
    <text x="822" y="248" font-size="9" letter-spacing="1.5"
          fill="#ffb86c" font-family="ui-monospace, 'SF Mono', Menlo, monospace">● INFRA</text>
    <text x="892" y="248" font-size="9" letter-spacing="1.5"
          fill="#f1fa8c" font-family="ui-monospace, 'SF Mono', Menlo, monospace">● CONTENT</text>
    <text x="970" y="248" font-size="9" letter-spacing="1.5"
          fill="#00ff41" font-family="ui-monospace, 'SF Mono', Menlo, monospace">● TEMPLATE</text>
  </g>

  <!-- ===== Signature ===== -->
  <text class="signature" x="1140" y="362" text-anchor="end" font-size="9" opacity="0.35"
        fill="#5dd4f5" letter-spacing="2"
        font-family="ui-monospace, 'SF Mono', Menlo, monospace">MADE WITH CLAUDE CODE</text>
</svg>
