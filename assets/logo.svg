<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" role="img" aria-label="huasan — ai coding · build in public">
  <title>huasan</title>
  <desc>Brand logo (variant A — symbol). A minimalist umbrella mark drawn in one stroke (echoing the name 画伞 — "drawn umbrella"), paired with the huasan wordmark and a stable tagline. Content-independent — reusable across all huasanai/* repos.</desc>

  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="70%">
      <stop offset="0%"  stop-color="#0a2415"/>
      <stop offset="60%" stop-color="#020806"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>

    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#00ff41"/>
      <stop offset="55%" stop-color="#00ff41"/>
      <stop offset="100%" stop-color="#5dd4f5"/>
    </linearGradient>

    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="strongGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <style><![CDATA[
      @keyframes fadeIn  { 0%{opacity:0;} 100%{opacity:1;} }
      @keyframes fadeUp  { 0%{opacity:0; transform:translateY(8px);} 100%{opacity:1; transform:translateY(0);} }
      @keyframes drawStroke { 0%{stroke-dashoffset:var(--len);} 100%{stroke-dashoffset:0;} }
      @keyframes floatY  { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-4px);} }
      @keyframes glitchJitter  { 0%,90%,100%{transform:translate(-2.5px,0);} 2%{transform:translate(-2.5px,1px);} 4%{transform:translate(-2.5px,-1px);} }
      @keyframes glitchJitterB { 0%,90%,100%{transform:translate(2.5px,0);} 2%{transform:translate(2.5px,-1px);} 4%{transform:translate(2.5px,1px);} }

      /* The umbrella: drawn stroke-by-stroke in 4 phases — echoes "画伞" (drawn umbrella) */
      .umb-canopy    { --len: 400; stroke-dasharray: 400; animation: drawStroke 1.0s cubic-bezier(0.4,0,0.2,1) 0.3s backwards; }
      .umb-shaft     { --len: 90;  stroke-dasharray: 90;  animation: drawStroke 0.5s cubic-bezier(0.4,0,0.2,1) 1.0s backwards; }
      .umb-handle    { --len: 50;  stroke-dasharray: 50;  animation: drawStroke 0.35s cubic-bezier(0.4,0,0.2,1) 1.4s backwards; }
      .umb-rib-1     { animation: fadeIn 0.3s ease 1.55s backwards; }
      .umb-rib-2     { animation: fadeIn 0.3s ease 1.60s backwards; }
      .umb-rib-3     { animation: fadeIn 0.3s ease 1.65s backwards; }
      .umb-rib-4     { animation: fadeIn 0.3s ease 1.70s backwards; }
      .umb-rib-5     { animation: fadeIn 0.3s ease 1.75s backwards; }
      .umb-tip       { animation: fadeIn 0.4s ease 1.50s backwards; }
      .umb-group     { animation: floatY 6s ease-in-out 3.5s infinite; transform-origin: center; }

      /* The wordmark */
      .brand-stack { animation: fadeUp 0.8s cubic-bezier(0.16,1,0.3,1) 1.8s backwards; }
      .ghost-cyan { transform: translate(-2.5px, 0); animation: glitchJitter 6s ease-in-out 4s infinite; }
      .ghost-red  { transform: translate(2.5px, 0); animation: glitchJitterB 6s ease-in-out 4s infinite; }
      .brand-bar  { stroke-dasharray: 200; animation: drawStroke 0.7s cubic-bezier(0.16,1,0.3,1) 2.3s backwards; --len: 200; }
      .brand-sub  { animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 2.5s backwards; }
      .brand-tag  { animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 2.7s backwards; }
      .signature  { animation: fadeIn 0.7s ease 3.0s backwards; }
    ]]></style>
  </defs>

  <!-- ===== Background ===== -->
  <rect width="1200" height="380" fill="url(#bgGlow)"/>

  <!-- ===== Umbrella symbol (left, x: 180-450, y: 60-300) ===== -->
  <g class="umb-group" filter="url(#softGlow)">
    <!-- Canopy: a single sweeping arc with subtle scallops -->
    <path class="umb-canopy"
          d="M 200 180 Q 230 110, 280 90 Q 315 80, 350 90 Q 400 110, 430 180"
          fill="none" stroke="url(#titleGrad)" stroke-width="3" stroke-linecap="round"/>
    <!-- Canopy underside arc (gives volume) -->
    <path class="umb-canopy"
          d="M 200 180 Q 315 155, 430 180"
          fill="none" stroke="#00ff41" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

    <!-- Shaft - connects from canopy underside (y=158) down past the canopy to handle -->
    <line class="umb-shaft" x1="315" y1="158" x2="315" y2="248"
          stroke="url(#titleGrad)" stroke-width="3" stroke-linecap="round"/>

    <!-- Handle (J curve mirrored to the LEFT) -->
    <path class="umb-handle"
          d="M 315 248 Q 315 272, 290 272"
          fill="none" stroke="url(#titleGrad)" stroke-width="3" stroke-linecap="round"/>

    <!-- Ribs (radial supports inside canopy) -->
    <line class="umb-rib-1" x1="315" y1="85" x2="218" y2="178"
          stroke="#5dd4f5" stroke-width="1" opacity="0.45" stroke-linecap="round"/>
    <line class="umb-rib-2" x1="315" y1="85" x2="263" y2="170"
          stroke="#5dd4f5" stroke-width="1" opacity="0.45" stroke-linecap="round"/>
    <line class="umb-rib-3" x1="315" y1="85" x2="315" y2="248"
          stroke="#5dd4f5" stroke-width="1" opacity="0.45" stroke-linecap="round"/>
    <line class="umb-rib-4" x1="315" y1="85" x2="367" y2="170"
          stroke="#5dd4f5" stroke-width="1" opacity="0.45" stroke-linecap="round"/>
    <line class="umb-rib-5" x1="315" y1="85" x2="412" y2="178"
          stroke="#5dd4f5" stroke-width="1" opacity="0.45" stroke-linecap="round"/>

    <!-- Tip (small accent at top) -->
    <circle class="umb-tip" cx="315" cy="80" r="3.5" fill="#00ff41" filter="url(#strongGlow)"/>
  </g>

  <!-- ===== Wordmark (right) ===== -->
  <g class="brand-stack">
    <text x="540" y="110" font-size="14" fill="#5dd4f5" opacity="0.5" letter-spacing="2"
          font-family="ui-monospace, 'SF Mono', Menlo, monospace">// 画伞</text>

    <g style="transform-origin: 540px 190px;">
      <text class="ghost-cyan" x="540" y="200" font-size="100" font-weight="700"
            fill="#5dd4f5" opacity="0.55" letter-spacing="-2"
            font-family="ui-monospace, 'SF Mono', Menlo, monospace">huasan</text>
      <text class="ghost-red" x="540" y="200" font-size="100" font-weight="700"
            fill="#ff5577" opacity="0.4" letter-spacing="-2"
            font-family="ui-monospace, 'SF Mono', Menlo, monospace">huasan</text>
      <text x="540" y="200" font-size="100" font-weight="700"
            fill="url(#titleGrad)" filter="url(#strongGlow)" letter-spacing="-2"
            font-family="ui-monospace, 'SF Mono', Menlo, monospace">huasan</text>
    </g>

    <line class="brand-bar" x1="540" y1="225" x2="700" y2="225"
          stroke="#5dd4f5" stroke-width="2.5" stroke-linecap="round"/>

    <text class="brand-sub" x="540" y="260" font-size="18" fill="#00ff41" opacity="0.85"
          font-family="ui-monospace, 'SF Mono', Menlo, monospace">ai coding · build in public.</text>

    <text class="brand-tag" x="540" y="290" font-size="13" font-style="italic"
          fill="#7eb89a" letter-spacing="0.5"
          font-family="Georgia, 'Songti SC', serif">a vibe coding lab — ship skills, ship stories.</text>
  </g>

  <!-- ===== Signature ===== -->
  <text class="signature" x="1140" y="362" text-anchor="end" font-size="9" opacity="0.35"
        fill="#5dd4f5" letter-spacing="2"
        font-family="ui-monospace, 'SF Mono', Menlo, monospace">MADE WITH CLAUDE CODE</text>
</svg>
